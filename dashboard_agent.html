<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackRock HackKnight 2026 — Agent Performance Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-card: #111827;
  --bg-card-hover: #1a2332;
  --border: #1e293b;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-green: #10b981;
  --accent-red: #ef4444;
  --accent-blue: #3b82f6;
  --accent-purple: #8b5cf6;
  --accent-amber: #f59e0b;
  --accent-cyan: #06b6d4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }

.header { background: linear-gradient(135deg, #0f172a 0%, #1a0e2e 100%); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 22px; font-weight: 700; }
.header h1 span { color: var(--accent-purple); }
.header .subtitle { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
.load-section { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.load-btn { background: var(--accent-blue); color: #fff; border: none; padding: 7px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: background .2s; }
.load-btn:hover { background: #2563eb; }
.load-btn.loaded { background: var(--accent-green); }
.status-badge { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 12px; color: var(--text-secondary); }
input[type="file"] { display: none; }

.compliance-banner { display: flex; gap: 12px; padding: 12px 32px; }
.tc-badge { flex: 1; padding: 14px 20px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
.tc-badge.pass { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); }
.tc-badge.fail { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
.tc-badge.warn { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); }
.tc-badge .tc-name { font-size: 13px; font-weight: 600; }
.tc-badge .tc-value { font-size: 18px; font-weight: 700; }
.tc-badge.pass .tc-value { color: var(--accent-green); }
.tc-badge.fail .tc-value { color: var(--accent-red); }
.tc-badge.warn .tc-value { color: var(--accent-amber); }

.kpi-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; padding: 0 32px; margin-bottom: 8px; }
.kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.kpi .label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.kpi .value { font-size: 20px; font-weight: 700; margin-top: 3px; }
.kpi .sub { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
.kpi .pos { color: var(--accent-green); }
.kpi .neg { color: var(--accent-red); }

.grid { display: grid; gap: 16px; padding: 16px 32px; }
.grid-2 { grid-template-columns: 1fr 1fr; }
.grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.grid-full { grid-template-columns: 1fr; }
.grid-2-1 { grid-template-columns: 2fr 1fr; }
.grid-1-2 { grid-template-columns: 1fr 2fr; }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.card-header { padding: 14px 18px 0; display: flex; justify-content: space-between; align-items: center; }
.card-header h3 { font-size: 14px; font-weight: 600; }
.card-header .tag { font-size: 11px; color: var(--text-muted); background: var(--bg-primary); padding: 3px 8px; border-radius: 4px; }
.card-body { padding: 8px 10px 10px; }

table.data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
table.data-table thead th { background: var(--bg-primary); color: var(--text-muted); text-transform: uppercase; font-size: 10px; letter-spacing: 0.4px; padding: 7px 8px; text-align: left; position: sticky; top: 0; cursor: pointer; user-select: none; }
table.data-table thead th:hover { color: var(--text-primary); }
table.data-table tbody td { padding: 6px 8px; border-top: 1px solid var(--border); color: var(--text-secondary); }
table.data-table tbody tr:hover td { background: var(--bg-card-hover); color: var(--text-primary); }
.table-wrap { max-height: 400px; overflow-y: auto; }
.table-wrap::-webkit-scrollbar { width: 6px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.buy-tag { color: var(--accent-green); font-weight: 600; }
.sell-tag { color: var(--accent-red); font-weight: 600; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state h3 { margin-bottom: 8px; font-size: 16px; }

.ca-audit-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; }
.ca-audit-item:last-child { border-bottom: none; }
.ca-audit-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.ca-audit-icon.reacted { background: rgba(16,185,129,0.2); color: var(--accent-green); }
.ca-audit-icon.missed { background: rgba(239,68,68,0.2); color: var(--accent-red); }
.ca-audit-icon.na { background: rgba(100,116,139,0.2); color: var(--text-muted); }

.llm-item { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 11px; }
.llm-item:last-child { border-bottom: none; }
.llm-tick { color: var(--accent-amber); font-weight: 700; margin-right: 8px; }
.llm-prompt { color: var(--text-secondary); max-height: 40px; overflow: hidden; transition: max-height 0.3s; cursor: pointer; }
.llm-prompt.expanded { max-height: 300px; }
.llm-response { color: var(--accent-cyan); margin-top: 4px; max-height: 40px; overflow: hidden; transition: max-height 0.3s; cursor: pointer; }
.llm-response.expanded { max-height: 300px; }

.sharpe-bar { background: linear-gradient(135deg, #111827 0%, #1a1033 100%); border: 1px solid rgba(139,92,246,0.4); border-radius: 10px; padding: 14px 24px; margin: 0 32px 4px; }
.sharpe-bar-top { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.sharpe-bar-title { font-size: 13px; font-weight: 700; color: var(--accent-purple); white-space: nowrap; }
.sharpe-bar-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex: 1; }
.sharpe-bar-controls label { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 5px; white-space: nowrap; }
.sharpe-bar-controls input[type="number"] { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 5px; padding: 4px 8px; width: 65px; font-size: 12px; font-family: inherit; }
.sharpe-bar-controls input[type="number"]:focus { outline: none; border-color: var(--accent-purple); box-shadow: 0 0 0 2px rgba(139,92,246,0.2); }
.sharpe-bar-controls select { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 5px; padding: 4px 8px; font-size: 12px; font-family: inherit; cursor: pointer; }
.sharpe-presets { display: flex; gap: 4px; flex-wrap: wrap; }
.sharpe-preset-btn { background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-secondary); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; transition: all .15s; }
.sharpe-preset-btn:hover, .sharpe-preset-btn.active { background: var(--accent-purple); color: #fff; border-color: var(--accent-purple); }
.sharpe-result-row { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
.sharpe-metric { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; min-width: 120px; flex: 1; }
.sharpe-metric .metric-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.sharpe-metric .metric-value { font-size: 20px; font-weight: 700; margin-top: 2px; }
.sharpe-metric .metric-sub { font-size: 9px; color: var(--text-secondary); margin-top: 1px; }
.sharpe-range-slider { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 8px; }
.sharpe-range-slider input[type="range"] { -webkit-appearance: none; appearance: none; flex: 1; height: 4px; background: var(--border); border-radius: 2px; outline: none; }
.sharpe-range-slider input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent-purple); cursor: pointer; border: 2px solid #1a1033; }
.sharpe-range-slider .range-label { font-size: 11px; color: var(--accent-purple); font-weight: 700; min-width: 24px; text-align: center; }

@media (max-width: 1200px) { .grid-2, .grid-3, .grid-2-1, .grid-1-2 { grid-template-columns: 1fr; } .kpi-row { grid-template-columns: repeat(3, 1fr); } .compliance-banner { flex-wrap: wrap; } .sharpe-bar { margin: 0 16px 4px; padding: 12px 16px; } .sharpe-bar-top { flex-direction: column; align-items: stretch; } }
</style>
</head>

const PLOTLY_BASE = { paper_bgcolor: '#111827', plot_bgcolor: '#0a0e17', font: { color: '#94a3b8', size: 11 }, margin: { t: 30, r: 20, b: 40, l: 60 }, xaxis: { gridcolor: '#1e293b', zerolinecolor: '#1e293b' }, yaxis: { gridcolor: '#1e293b', zerolinecolor: '#1e293b' } };
const PCFG = { responsive: true, displayModeBar: true, modeBarButtonsToRemove: ['lasso2d','select2d'], displaylogo: false };
const SECTOR_COLORS = { TECH:'#3b82f6', FINANCE:'#10b981', HEALTHCARE:'#8b5cf6', ENERGY:'#f59e0b', CONSUMER:'#06b6d4', TECHNOLOGY:'#3b82f6' };

let DATA = { snap: null, orders: null, results: null, llm: null, feed: null, ca: null, validation: null };

function loadFile(input, key) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { try { DATA[key] = JSON.parse(e.target.result); tryRender(); } catch(err) { alert('Invalid JSON: '+err.message); } };
  reader.readAsText(file);
}

async function autoLoad() {
  const SK = 'starter_kit - IIT Delhi Hackathon/Starter_Kit/';
  async function fetchJson(path) {
    try { const r = await fetch(path); if (r.ok) return await r.json(); } catch (e) {}
    return null;
  }

  const outputBundles = [
    ['snap', ['output/portfolio_snapshots.json', 'portfolio_snapshots.json']],
    ['orders', ['output/orders_log.json', 'orders_log.json']],
    ['results', ['output/results.json', 'results.json']],
    ['llm', ['output/llm_call_log.json', 'llm_call_log.json']],
    ['validation', ['output/validation_result.json', 'validation_result.json']],
  ];
  for (const [key, paths] of outputBundles) {
    if (DATA[key]) continue;
    for (const p of paths) {
      const j = await fetchJson(p);
      if (j) { DATA[key] = j; break; }
    }
  }

  const dataBundles = [
    ['feed', ['market_feed_full.json', 'market_feed_sample.json']],
    ['ca', ['corporate_actions.json']],
    ['fund', ['fundamentals.json']],
  ];
  for (const [key, files] of dataBundles) {
    if (DATA[key]) continue;
    for (const fname of files) {
      let got = null;
      for (const prefix of ['', SK]) {
        got = await fetchJson(prefix + fname);
        if (got) break;
      }
      if (got) { DATA[key] = got; break; }
    }
  }

  const hasData = DATA.snap || DATA.orders || DATA.results || DATA.llm || DATA.validation || DATA.feed || DATA.ca;
  if (hasData) {
    tryRender();
    const btn = document.getElementById('btnAutoLoadAgent');
    if (btn) { btn.classList.add('loaded'); btn.textContent = 'Loaded ✓'; }
  } else {
    document.getElementById('statusBadge').textContent = 'Auto-load failed — use file buttons or run: python -m http.server';
  }
}

function tryRender() {
  const snaps = normalizeSnapshots(DATA.snap);
  const orders = Array.isArray(DATA.orders) ? DATA.orders : [];
  const results = DATA.results && typeof DATA.results === 'object' ? DATA.results : {};
  const llmLog = Array.isArray(DATA.llm) ? DATA.llm : [];
  const validation = DATA.validation && typeof DATA.validation === 'object' ? DATA.validation : null;
  const caList = normalizeCA(DATA.ca);
  const feed = normalizeFeed(DATA.feed);

  const ctx = { snaps, orders, results, llmLog, caList, feed, validation };
  const llmUsed = results.llm_calls_used != null ? results.llm_calls_used : llmLog.length;
  const llmQuota = results.llm_quota != null ? results.llm_quota : 60;
  const nSnaps = validation?.snapshots_count != null ? validation.snapshots_count : snaps.length;
  const nOrders = validation?.orders_count != null ? validation.orders_count : orders.length;
  document.getElementById('statusBadge').textContent =
    `${nSnaps} snaps · ${nOrders} orders · ${llmUsed}/${llmQuota} LLM · results.json${Object.keys(results).length ? ' ✓' : ''}`;
  renderDashboard(ctx);
}

function normalizeSnapshots(raw) {
  if (!raw) return [];
  if (!Array.isArray(raw)) return [];
  return raw.map(s => {
    const pv = s.portfolio_value ?? s.total_value ?? 0;
    const cash = s.cash ?? 0;
    const tick = s.tick_index ?? 0;
    let holdings = {};
    if (Array.isArray(s.holdings)) {
      for (const h of s.holdings) holdings[h.ticker] = { qty: h.qty || h.quantity || 0, price: h.price || h.avg_price || 0, value: h.value || (h.qty||0)*(h.price||h.avg_price||0) };
    } else if (typeof s.holdings === 'object' && s.holdings) {
      for (const [t, v] of Object.entries(s.holdings)) {
        if (typeof v === 'object') holdings[t] = { qty: v.quantity || v.qty || 0, price: v.price || v.avg_price || 0, value: v.value || 0 };
      }
    }
    const nHoldings = s.n_holdings ?? Object.keys(holdings).filter(k => holdings[k].qty > 0).length;
    return { tick, pv, cash, holdings, nHoldings };
  });
}

function normalizeCA(raw) {
  if (!raw) return [];
  return Array.isArray(raw) ? raw : (raw.actions || []);
}

function normalizeFeed(raw) {
  if (!raw) return [];
  const arr = Array.isArray(raw) ? raw : (raw.ticks || []);
  return arr.map(tick => {
    const idx = tick.tick_index ?? 0;
    let data = {};
    if (tick.tickers && Array.isArray(tick.tickers)) {
      for (const t of tick.tickers) data[t.ticker] = { price: parseFloat(t.price), sector: t.sector || '' };
    } else if (tick.prices) {
      for (const [k, v] of Object.entries(tick.prices)) data[k] = { price: typeof v === 'object' ? parseFloat(v.price||v) : parseFloat(v), sector: '' };
    }
    return { tick: idx, data };
  });
}

function mean(arr) { return arr.reduce((a,b)=>a+b,0)/arr.length; }
function std(arr) { const m = mean(arr); return Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length); }

function tickerSector(ticker) {
  const prefix = { A:'TECH', B:'FINANCE', C:'HEALTHCARE', D:'ENERGY', E:'CONSUMER' };
  return prefix[ticker[0]] || 'OTHER';
}

function renderNAV(ctx) {
  const { snaps, feed, caList, results } = ctx;
  const ticks = snaps.map(s=>s.tick), vals = snaps.map(s=>s.pv);
  const startV = results && results.starting_value != null ? results.starting_value : (snaps.length ? snaps[0].pv : 10_000_000);

  const traces = [{ x: ticks, y: vals, name: 'Portfolio NAV', type: 'scatter', mode: 'lines', line: { color: '#8b5cf6', width: 2 }, fill: 'tozeroy', fillcolor: 'rgba(139,92,246,0.08)' }];

  if (feed.length) {
    const allTickers = Object.keys(feed[0].data);
    const base = {};
    for (const t of allTickers) base[t] = feed[0].data[t]?.price || 0;
    const eqWeight = startV / allTickers.length;
    const shares = {};
    for (const t of allTickers) shares[t] = base[t] > 0 ? eqWeight / base[t] : 0;
    const benchTicks = [], benchVals = [];
    for (const f of feed) {
      let bv = 0;
      for (const t of allTickers) bv += shares[t] * (f.data[t]?.price || base[t]);
      benchTicks.push(f.tick); benchVals.push(bv);
    }
    traces.push({ x: benchTicks, y: benchVals, name: 'Equal-Weight Benchmark', type: 'scatter', mode: 'lines', line: { color: '#64748b', width: 1.5, dash: 'dash' } });
  }

  const caShapes = caList.filter(ca => ca.tick != null).map(ca => ({ type:'line', x0:ca.tick, x1:ca.tick, y0:0, y1:1, yref:'paper', line:{ color:'rgba(245,158,11,0.4)', width:1, dash:'dot' } }));
  const caAnno = caList.filter(ca => ca.tick != null).map((ca,i) => ({ x:ca.tick, y:1-0.05*(i%4), yref:'paper', text:`${ca.type?.substring(0,8)} (${ca.ticker})`, showarrow:false, font:{size:8,color:'#f59e0b'}, bgcolor:'rgba(245,158,11,0.1)', borderpad:2 }));

  Plotly.newPlot('chartNAV', traces, { ...PLOTLY_BASE, xaxis:{...PLOTLY_BASE.xaxis,title:'Tick'}, yaxis:{...PLOTLY_BASE.yaxis,title:'NAV ($)'}, shapes:caShapes, annotations:caAnno, showlegend:true, legend:{font:{size:10}} }, PCFG);
}

let _currentCtx = null;

function renderRollingSharpe(ctx) {
  _currentCtx = ctx;
  const win = parseInt(document.getElementById('rollingWindow')?.value) || 20;
  _plotRollingSharpe(ctx, win);
  computeCustomSharpe();

function _plotRollingSharpe(ctx, win) {
  const { snaps } = ctx;
  const values = snaps.map(s=>s.pv);
  const logRets = [];
  for (let i=1;i<values.length;i++) if(values[i-1]>0&&values[i]>0) logRets.push(Math.log(values[i]/values[i-1]));
  const ticks = [], sharpes = [];
  for (let i = win; i < logRets.length; i++) {
    const slice = logRets.slice(i-win, i);
    const m = mean(slice), s = std(slice);
    sharpes.push(s > 1e-10 ? (m/s) * Math.sqrt(390) : 0);
    ticks.push(snaps[i+1]?.tick ?? i+1);
  }

  const startTick = parseInt(document.getElementById('sharpeStart')?.value) || 0;
  const endTick = parseInt(document.getElementById('sharpeEnd')?.value) || 389;

  const shapes = [
    { type:'rect', x0:startTick, x1:endTick, y0:0, y1:1, yref:'paper', fillcolor:'rgba(139,92,246,0.08)', line:{width:0} },
    { type:'line', x0:startTick, x1:startTick, y0:0, y1:1, yref:'paper', line:{color:'rgba(139,92,246,0.6)',width:1.5,dash:'dash'} },
    { type:'line', x0:endTick, x1:endTick, y0:0, y1:1, yref:'paper', line:{color:'rgba(139,92,246,0.6)',width:1.5,dash:'dash'} },
  ];

  Plotly.newPlot('chartRollSharpe', [
    { x: ticks, y: sharpes, type:'scatter', mode:'lines', line:{color:'#f59e0b',width:2}, fill:'tozeroy', fillcolor:'rgba(245,158,11,0.08)', name:'Rolling Sharpe' },
    { x:[ticks[0]||0,ticks[ticks.length-1]||389], y:[0,0], type:'scatter', mode:'lines', line:{color:'#475569',width:1,dash:'dash'}, showlegend:false }
  ], { ...PLOTLY_BASE, xaxis:{...PLOTLY_BASE.xaxis,title:'Tick'}, yaxis:{...PLOTLY_BASE.yaxis,title:`Rolling Sharpe (${win}-tick)`}, showlegend:false, shapes }, PCFG);

  const tag = document.getElementById('rollingSharpeTag');
  if (tag) tag.textContent = `${win}-tick window`;
}

function updateRollingSharpeWindow() {
  if (!_currentCtx) return;
  const win = parseInt(document.getElementById('rollingWindow')?.value) || 20;
  _plotRollingSharpe(_currentCtx, win);
}

function computeCustomSharpe() {
  if (!_currentCtx) return;
  const { snaps } = _currentCtx;
  if (!snaps.length) return;

  const startTick = parseInt(document.getElementById('sharpeStart')?.value) || 0;
  const endTick = parseInt(document.getElementById('sharpeEnd')?.value) || 389;
  const annualizeMode = document.getElementById('sharpeAnnualize')?.value || 'auto';

  const filtered = snaps.filter(s => s.tick >= startTick && s.tick <= endTick);
  if (filtered.length < 2) {
    _setSharpeResults('—', 'Need >= 2 ticks', '—', '', '—', '', '—', '', '—', '');
    return;
  }

  const values = filtered.map(s => s.pv);
  const logRets = [];
  for (let i = 1; i < values.length; i++) {
    if (values[i-1] > 0 && values[i] > 0) logRets.push(Math.log(values[i] / values[i-1]));
  }

  if (logRets.length < 2) {
    _setSharpeResults('—', 'Not enough returns', '—', '', '—', '', '—', '', '—', '');
    return;
  }

  const mu = mean(logRets);
  const sigma = std(logRets);

  let annFactor;
  if (annualizeMode === 'auto') annFactor = Math.sqrt(logRets.length);
  else annFactor = Math.sqrt(parseInt(annualizeMode));

  const sharpe = sigma > 1e-10 ? (mu / sigma) * annFactor : 0;

  const periodReturn = (values[values.length-1] - values[0]) / values[0] * 100;
  const annVol = sigma * annFactor * 100;

  let peak = values[0], maxDD = 0;
  for (const v of values) { if (v > peak) peak = v; const dd = (v - peak) / peak; if (dd < maxDD) maxDD = dd; }

  const sharpeColor = sharpe > 1 ? 'var(--accent-green)' : sharpe > 0 ? 'var(--accent-amber)' : 'var(--accent-red)';

  const elVal = document.getElementById('sharpePeriodValue');
  if (elVal) { elVal.textContent = sharpe.toFixed(4); elVal.style.color = sharpeColor; }
  document.getElementById('sharpePeriodSub').textContent = `Ticks ${startTick}–${endTick} (${filtered.length} ticks, ${logRets.length} returns)`;

  const retEl = document.getElementById('sharpePeriodReturn');
  if (retEl) { retEl.textContent = `${periodReturn >= 0 ? '+' : ''}${periodReturn.toFixed(3)}%`; retEl.style.color = periodReturn >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'; }
  document.getElementById('sharpePeriodReturnSub').textContent = `$${values[0].toLocaleString(undefined,{maximumFractionDigits:0})} → $${values[values.length-1].toLocaleString(undefined,{maximumFractionDigits:0})}`;

  const volEl = document.getElementById('sharpePeriodVol');
  if (volEl) { volEl.textContent = `${annVol.toFixed(2)}%`; volEl.style.color = 'var(--accent-cyan)'; }
  document.getElementById('sharpePeriodVolSub').textContent = `Raw σ: ${(sigma * 100).toFixed(4)}% per tick`;

  const muEl = document.getElementById('sharpePeriodMu');
  if (muEl) { muEl.textContent = `${(mu * 10000).toFixed(2)} bps`; muEl.style.color = mu >= 0 ? 'var(--accent-green)' : 'var(--accent-red)'; }
  document.getElementById('sharpePeriodMuSub').textContent = `${(mu * 100).toFixed(6)}% per tick`;

  const ddEl = document.getElementById('sharpePeriodDD');
  if (ddEl) { ddEl.textContent = `${(maxDD * 100).toFixed(3)}%`; ddEl.style.color = 'var(--accent-red)'; }
  document.getElementById('sharpePeriodDDSub').textContent = `Peak-to-trough in range`;

  if (_currentCtx) {
    const win = parseInt(document.getElementById('rollingWindow')?.value) || 20;
    _plotRollingSharpe(_currentCtx, win);
  }
}

function renderSectorAllocation(ctx) {
  const { snaps } = ctx;
  const sectors = ['TECH','FINANCE','HEALTHCARE','ENERGY','CONSUMER'];
  const sectorWeights = {};
  for (const s of sectors) sectorWeights[s] = [];
  const ticks = [];
  for (const snap of snaps) {
    ticks.push(snap.tick);
    const totInvested = snap.pv - snap.cash;
    const sw = {};
    for (const s of sectors) sw[s] = 0;
    for (const [t, h] of Object.entries(snap.holdings)) {
      if (h.qty > 0) { const sec = tickerSector(t); sw[sec] = (sw[sec]||0) + (h.value || h.qty * h.price || 0); }
    }
    for (const s of sectors) sectorWeights[s].push(totInvested > 0 ? sw[s] / snap.pv * 100 : 0);
  }
  const traces = sectors.map(s => ({
    x: ticks, y: sectorWeights[s], name: s, type: 'scatter', mode: 'lines', stackgroup: 'one',
    line: { width: 0.5, color: SECTOR_COLORS[s] }, fillcolor: (SECTOR_COLORS[s]||'#64748b') + '66'

function renderCAAudit(ctx) {
  const { caList, orders } = ctx;
  const el = document.getElementById('caAudit');
  if (!el) return;
  if (!caList.length) { el.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px">No corporate actions loaded</p>'; return; }

  const sorted = [...caList].sort((a,b)=>(a.tick??999)-(b.tick??999));
  el.innerHTML = sorted.map(ca => {
    const ticker = ca.ticker || '';
    const tick = ca.tick;
    const caType = (ca.type||'').toUpperCase();
    const expectedBeh = ca.expected_behaviour || '';

    let reactionIcon = 'na', reactionText = 'Tick not disclosed (live event)';
    if (tick != null) {
      const windowStart = tick, windowEnd = tick + 15;
      const relevantOrders = orders.filter(o => {
        const ot = o.tick_index ?? 0;
        const oTicker = o.ticker || '';
        return ticker.split(',').some(tk => oTicker === tk.trim()) && ot >= windowStart && ot <= windowEnd;
      });

      if (relevantOrders.length > 0) {
        const sides = relevantOrders.map(o => (o.side||'').toUpperCase());
        reactionIcon = 'reacted';
        reactionText = `Traded ${relevantOrders.length}x within ${windowEnd-windowStart} ticks: ${sides.join(', ')}`;
      } else {
        reactionIcon = 'missed';
        reactionText = `No trades on ${ticker} within ticks ${windowStart}–${windowEnd}`;
      }
    }

    return `<div class="ca-audit-item">
      <div class="ca-audit-icon ${reactionIcon}">${reactionIcon==='reacted'?'✓':reactionIcon==='missed'?'✗':'?'}</div>
      <div style="flex:1">
        <div style="font-weight:600;color:${reactionIcon==='reacted'?'var(--accent-green)':reactionIcon==='missed'?'var(--accent-red)':'var(--text-muted)'}">${caType} — ${ticker} ${tick!=null?'(Tick '+tick+')':'(Live)'}</div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${reactionText}</div>
        ${expectedBeh?`<div style="font-size:10px;color:var(--text-muted);margin-top:2px">Expected: ${expectedBeh}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderLLMUsage(ctx) {
  const { llmLog, caList } = ctx;
  const cumTicks = [], cumCalls = [];

  for (let i = 0; i < llmLog.length; i++) {

    cumCalls.push(i + 1);
  }
  const caShapes = caList.filter(ca=>ca.tick!=null).map(ca=>({type:'line',x0:ca.tick,x1:ca.tick,y0:0,y1:1,yref:'paper',line:{color:'rgba(245,158,11,0.3)',width:1,dash:'dot'}}));
  Plotly.newPlot('chartLLMUsage', [{
    x: cumTicks, y: cumCalls, type:'scatter', mode:'lines+markers',
    line:{color:'#f59e0b',width:2}, marker:{size:5,color:'#f59e0b'},
    hovertemplate:'Tick %{x}<br>Call #%{y}<extra></extra>'
  }], { ...PLOTLY_BASE, height:190, margin:{...PLOTLY_BASE.margin,t:10,b:30}, xaxis:{...PLOTLY_BASE.xaxis,title:'Tick'}, yaxis:{...PLOTLY_BASE.yaxis,title:'Cumulative Calls'}, shapes:caShapes, showlegend:false }, PCFG);

  const el = document.getElementById('llmLogList');
  if (!el) return;
  el.innerHTML = llmLog.slice(0,50).map((l,i) => {
    const prompt = l.prompt || '';
    const resp = l.response || '';
    return `<div class="llm-item">
      <span class="llm-tick">Tick ${l.tick_index??'?'}</span> Call #${l.call_number||i+1}
      <div class="llm-prompt" onclick="this.classList.toggle('expanded')">Prompt: ${escapeHtml(prompt.substring(0,200))}${prompt.length>200?'...':''}</div>
      <div class="llm-response" onclick="this.classList.toggle('expanded')">Response: ${escapeHtml((typeof resp==='string'?resp:JSON.stringify(resp)).substring(0,200))}</div>
    </div>`;
  }).join('');
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderOrdersTable(ctx) {
  const { orders } = ctx;
  const el = document.getElementById('ordersTableWrap');
  if (!el) return;
  const cols = [
    {key:'tick_index',label:'Tick'}, {key:'ticker',label:'Ticker'}, {key:'side',label:'Side'},
    {key:'quantity',label:'Qty'}, {key:'exec_price',label:'Price'}, {key:'trade_value',label:'Value'},
    {key:'fees',label:'Fees'}
  ];
  let sortCol = 'tick_index', sortDir = 1;

  function render() {
    const sorted = [...orders].sort((a,b) => {
      let va = a[sortCol]??a.qty??a.price??0, vb = b[sortCol]??b.qty??b.price??0;
      if (sortCol==='quantity') { va=a.quantity||a.qty||0; vb=b.quantity||b.qty||0; }
      if (sortCol==='exec_price') { va=a.exec_price||a.price||0; vb=b.exec_price||b.price||0; }
      return (typeof va==='string'?va.localeCompare(vb):va-vb)*sortDir;
    });
    el.innerHTML = `<table class="data-table"><thead><tr>${cols.map(c=>`<th data-col="${c.key}">${c.label} ${sortCol===c.key?(sortDir>0?'▲':'▼'):''}</th>`).join('')}</tr></thead><tbody>${sorted.map(o => {
      const side = (o.side||'').toUpperCase();
      const qty = o.quantity||o.qty||0;
      const price = o.exec_price||o.price||0;
      const val = o.trade_value||(qty*price);
      const fees = o.fees||0;
      return `<tr>
        <td>${o.tick_index??0}</td>
        <td><span style="color:${SECTOR_COLORS[tickerSector(o.ticker||'')]||'#94a3b8'}">${o.ticker||''}</span></td>
        <td class="${side==='BUY'?'buy-tag':'sell-tag'}">${side}</td>
        <td>${qty.toLocaleString()}</td>
        <td>$${price.toFixed(2)}</td>
        <td>$${val.toLocaleString(undefined,{maximumFractionDigits:0})}</td>
        <td>$${fees.toFixed(2)}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
    el.querySelectorAll('th').forEach(th=>{th.onclick=()=>{const c=th.dataset.col;if(sortCol===c)sortDir*=-1;else{sortCol=c;sortDir=1;}render();};});
  }
  render();
}

function renderTickerPnL(ctx) {
  const { orders, snaps } = ctx;
  const pnlByTicker = {};
  const costBasis = {};

  for (const o of [...orders].sort((a,b)=>(a.tick_index||0)-(b.tick_index||0))) {
    const t = o.ticker||'';
    const side = (o.side||'').toUpperCase();
    const qty = o.quantity||o.qty||0;
    const price = o.exec_price||o.price||0;
    const fees = o.fees||0;

    if (!pnlByTicker[t]) { pnlByTicker[t] = 0; costBasis[t] = { qty: 0, totalCost: 0 }; }
    if (side === 'BUY') {
      costBasis[t].totalCost += qty * price + fees;
      costBasis[t].qty += qty;
    } else if (side === 'SELL') {
      const avgCost = costBasis[t].qty > 0 ? costBasis[t].totalCost / costBasis[t].qty : price;
      pnlByTicker[t] += qty * (price - avgCost) - fees;
      costBasis[t].qty -= qty;
      costBasis[t].totalCost = costBasis[t].qty > 0 ? costBasis[t].qty * avgCost : 0;
    }
  }

  if (snaps.length) {
    const lastSnap = snaps[snaps.length-1];
    for (const [t, h] of Object.entries(lastSnap.holdings)) {
      if (h.qty > 0 && costBasis[t]) {
        const avgCost = costBasis[t].qty > 0 ? costBasis[t].totalCost / costBasis[t].qty : 0;
        const currentPrice = h.price || 0;
        pnlByTicker[t] = (pnlByTicker[t]||0) + h.qty * (currentPrice - avgCost);
      }
    }
  }

  const items = Object.entries(pnlByTicker).map(([t,pnl])=>({ticker:t,pnl})).sort((a,b)=>b.pnl-a.pnl);
  if (!items.length) return;

  Plotly.newPlot('chartTickerPnL', [{
    x: items.map(i=>i.ticker), y: items.map(i=>i.pnl), type:'bar',
    marker: { color: items.map(i=>i.pnl>=0?'rgba(16,185,129,0.7)':'rgba(239,68,68,0.7)') },
    hovertemplate: '<b>%{x}</b><br>PnL: $%{y:,.0f}<extra></extra>'
  }], { ...PLOTLY_BASE, xaxis:{...PLOTLY_BASE.xaxis,title:'Ticker',tickangle:-45,tickfont:{size:9}}, yaxis:{...PLOTLY_BASE.yaxis,title:'Estimated PnL ($)'}, showlegend:false, shapes:[{type:'line',x0:0,x1:1,xref:'paper',y0:0,y1:0,line:{color:'#475569',width:1,dash:'dash'}}] }, PCFG);
}
